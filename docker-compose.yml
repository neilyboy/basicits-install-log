services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: basicits-install-log
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - app-data:/data
    environment:
      - PORT=3000
      - DATA_DIR=/data
      - NODE_ENV=production
      - ADMIN_PIN=${ADMIN_PIN:-1234}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  app-data:
    driver: local
